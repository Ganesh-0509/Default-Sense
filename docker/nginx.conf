# DefaultSense AI — frontend nginx config (Phase 8)
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend — used by local docker-compose, where the frontend
    # talks to the backend on the same origin via the "backend" service hostname.
    #
    # In cloud deploys (e.g. Railway) the app is built with an absolute VITE_API_URL and
    # the browser calls the backend directly, so this block is never hit. Using a *variable*
    # in proxy_pass makes nginx resolve the upstream lazily at request time instead of at
    # startup — so a missing "backend" host no longer crashes the whole server on boot.
    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=30s;   # Docker's embedded DNS (compose)
        set $backend_upstream "http://backend:8000";
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Cache static assets.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
