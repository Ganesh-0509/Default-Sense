# ==========================================================
# DefaultSense AI — Full-stack orchestration (Phase 8)
# Brings up PostgreSQL + Neo4j + FastAPI backend + React/nginx frontend.
#   docker compose up -d
# Frontend: http://localhost:8080   API: http://localhost:8000
# ==========================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: defaultsense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-defaultsense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-defaultsense}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-defaultsense}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: defaultsense-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-changeme}
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: defaultsense-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-defaultsense}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-defaultsense}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
    ports:
      - "8000:8000"
    volumes:
      - model_data:/app/models/saved_models
      - upload_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: defaultsense-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  neo4j_data:
  model_data:
  upload_data:
